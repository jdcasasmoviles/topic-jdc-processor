services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_HEAP_OPTS: "-Xmx256M -Xms256M"
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181"]
      interval: 8s
      timeout: 6s
      retries: 7
      start_period: 8s    # ← Solo una vez
    mem_limit: 256M
    mem_reservation: 192M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      KAFKA_NETWORK_THREADS: 2
      KAFKA_IO_THREADS: 4
      KAFKA_ZOOKEEPER_CONNECTION_TIMEOUT_MS: 30000  # Reducido de 60000
      KAFKA_ZOOKEEPER_SESSION_TIMEOUT_MS: 30000     # Reducido de 60000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CREATE_TOPICS: "_schemas:1:1"  # Crear topic de schemas explícitamente
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      jdc-network:
        aliases:
          - kafka
    healthcheck:
      test: ["CMD", "bash", "-c", "
        pgrep -f 'kafka\\.Kafka' >/dev/null || exit 1
        nc -z localhost 9092 || exit 1
        # Después de 20s, verificar ZK
        if [ $$(($(date +%s) - $$(stat -c %Y /proc/1 2>/dev/null || echo $$(date +%s)))) -gt 12 ]; then
          echo srvr | nc zookeeper 2181 2>/dev/null | grep -q Mode || exit 1
        fi
        exit 0
        "]  
      interval: 8s
      timeout: 5s
      retries: 8
      start_period: 10s
    mem_limit: 512M
    mem_reservation: 512M
    restart: on-failure:3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy    
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_HEAP_OPTS: "-Xmx256M -Xms256M"
      SCHEMA_REGISTRY_KAFKASTORE_CACHE_SIZE: 500
      SCHEMA_REGISTRY_KAFKASTORE_TIMEOUT_MS: 10000  # Timeout más agresivo
      SCHEMA_REGISTRY_KAFKASTORE_INIT_TIMEOUT_MS: 15000
      SCHEMA_REGISTRY_MASTER_ELIGIBILITY: "true"
      SCHEMA_REGISTRY_DEBUG: "false"  # Reducir logs en producción
    ports:
      - "8081:8081"
    networks:
      - jdc-network
    healthcheck:
      test: ["CMD", "bash", "-c", "
        nc -z localhost 8081 || exit 1
        # Usar /dev/tcp en lugar de curl
        timeout 2 bash -c 'echo -e \"GET /subjects HTTP/1.0\\n\\n\" > /dev/tcp/localhost/8081' 2>/dev/null || exit 1
        "]  
      interval: 6s
      timeout: 4s
      retries: 8
      start_period: 8s
    mem_limit: 512M
    mem_reservation: 384M
    restart: on-failure:3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  jdc-network:
    driver: bridge