openapi: 3.0.1
info:
  title: Topic JDC Processor API
  description: API for processing and publishing messages to Kafka topic
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Local server
tags:
  - name: messages
    description: Message processing operations
paths:
  /task:
    post:
      tags:
        - messages
      summary: Process and publish a message
      operationId: processMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskRequest'
      responses:
        '200':
          description: Message processed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'
        '400':
          description: Bad Request - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validationError:
                  value:
                    error: "Validation Error"
                    message: "Invalid message format"
                    timestamp: "2024-01-01T00:00:00Z"
                    status: 400
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                notFound:
                  value:
                    error: "Resource not found"
                    message: "Message with ID 123 not found"
                    timestamp: "2024-01-01T00:00:00Z"
                    status: 404
        '429':
          description: Too Many Requests - Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                rateLimit:
                  value:
                    error: "Rate limit exceeded"
                    message: "Too many requests. Please try again later"
                    timestamp: "2024-01-01T00:00:00Z"
                    status: 429
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                serverError:
                  value:
                    error: "Internal Server Error"
                    message: "An unexpected error occurred"
                    timestamp: "2024-01-01T00:00:00Z"
                    status: 500
        '504':
          description: Gateway Timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                timeout:
                  value:
                    error: "Gateway Timeout"
                    message: "The request timed out"
                    timestamp: "2024-01-01T00:00:00Z"
                    status: 504
components:
  schemas:
    TaskRequest:
      type: object
      required:
        - name
        - description
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 300
          description: Name task
          example: "Sample message content"
        description:
          type: string
          minLength: 2
          maxLength: 500
          description: Description task
          example: "web-app"
    TaskResponse:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          maximum: 10
          description: Id task
          example: 5
        status:
          type: string
          enum: [SUCCESS, FAILED]
          description: Processing status
          example: "SUCCESS"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error type
          example: "Validation Error"
        message:
          type: string
          description: Detailed error message
          example: "Invalid message format"
        timestamp:
          type: string
          format: date-time
          description: Error timestamp
          example: "2024-01-01T00:00:00Z"
        path:
          type: string
          description: Request path
          example: "/api/v1/messages"
        status:
          type: integer
          description: HTTP status code
          example: 400