# Server configuration
quarkus.http.port=8084
quarkus.http.io-threads=8
quarkus.http.worker-threads=32



# Habilitar preview features en tiempo de ejecucion
quarkus.jvm.additional-arguments=--enable-preview

# Kafka configuration
kafka.bootstrap.servers=localhost:9092
mp.messaging.outgoing.topic-jdc.connector=smallrye-kafka
mp.messaging.outgoing.topic-jdc.topic=topic-jdc
mp.messaging.outgoing.topic-jdc.value.serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
mp.messaging.outgoing.topic-jdc.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.topic-jdc.acks=all
mp.messaging.outgoing.topic-jdc.retries=10
mp.messaging.outgoing.topic-jdc.max.in.flight.requests.per.connection=1
mp.messaging.outgoing.topic-jdc.enable.idempotence=true
mp.messaging.outgoing.topic-jdc.compression.type=snappy

# Connection management
mp.messaging.outgoing.topic-jdc.connections.max.idle.ms=300000

# Batch menor latencia
mp.messaging.outgoing.topic-jdc.linger.ms=5
mp.messaging.outgoing.topic-jdc.batch.size=131072

# Reducir timeouts de Kafka
mp.messaging.outgoing.topic-jdc.delivery.timeout.ms=5000
mp.messaging.outgoing.topic-jdc.request.timeout.ms=3000

# Backoff mßs progresivo
mp.messaging.outgoing.topic-jdc.retry.backoff.ms=500
mp.messaging.outgoing.topic-jdc.reconnect.backoff.ms=500
mp.messaging.outgoing.topic-jdc.reconnect.backoff.max.ms=10000

# Schema Registry
mp.messaging.connector.smallrye-kafka.schema.registry.url=http://localhost:8081

# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true
quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=location,info


# Configuraci¾n de Vert.x para reactividad
quarkus.vertx.max-event-loop-execute-time=2S
quarkus.vertx.warning-exception-time=5S
quarkus.vertx.worker-pool-size=400
quarkus.vertx.event-loops-pool-size=8

# Timeouts de operaciones reactivas
quarkus.mutiny.operation-timeout=10S

# Aumentar backlog de conexiones para picos de trßfico
##quarkus.http.accept-backlog=8192